name: Build V10.2 offline components

on:
  pull_request:
    paths:
      - '.github/workflows/build-v102-offline-components.yml'
      - '.github/v102-build-trigger.txt'
      - 'releases/nspire_v10_0_0_daily_driver_platform_all_in_one.sh'
      - 'releases/nspire_v10_1_0_companion_blackbox_all_in_one.sh'

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build offline component bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out/nspire_v10_2_0_offline_components
          cp releases/nspire_v10_0_0_daily_driver_platform_all_in_one.sh \
             out/nspire_v10_2_0_offline_components/10_install_v10_0.sh
          cp releases/nspire_v10_1_0_companion_blackbox_all_in_one.sh \
             out/nspire_v10_2_0_offline_components/20_install_v10_1_original.sh
          chmod +x out/nspire_v10_2_0_offline_components/*.sh
          sha256sum out/nspire_v10_2_0_offline_components/*.sh > out/nspire_v10_2_0_offline_components/SHA256SUMS
          tar -C out -czf nspire_v10_2_0_offline_components.tar.gz nspire_v10_2_0_offline_components
      - uses: actions/upload-artifact@v4
        with:
          name: nspire-v10-2-offline-components
          path: nspire_v10_2_0_offline_components.tar.gz
          if-no-files-found: error
