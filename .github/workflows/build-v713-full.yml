name: Diagnose V7.1.3 source chunks

on:
  push:
    branches: [release-v7.1.3-full-package]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Download chunks and diagnose
        shell: bash
        run: |
          set +e
          BASE='https://raw.githubusercontent.com/mikavahakangas-hue/Pirre/release-v7.1.3-full-package/releases/v7.1.3-source'
          : > /tmp/v713.b64
          for p in part00.b64 part01.b64 part02.b64 part03.b64; do
            curl -L --fail --retry 3 "$BASE/$p" -o "/tmp/$p"
            echo "$p chars=$(wc -c < /tmp/$p)" | tee -a /tmp/result.txt
            cat "/tmp/$p" >> /tmp/v713.b64
          done
          echo "base64_chars=$(wc -c < /tmp/v713.b64)" | tee -a /tmp/result.txt
          base64 -d /tmp/v713.b64 > /tmp/v713.tar.gz 2>/tmp/decode-error.txt
          echo "decode_rc=$?" | tee -a /tmp/result.txt
          echo "size_bytes=$(stat -c %s /tmp/v713.tar.gz)" | tee -a /tmp/result.txt
          echo "sha256=$(sha256sum /tmp/v713.tar.gz | awk '{print $1}')" | tee -a /tmp/result.txt
          tar -tzf /tmp/v713.tar.gz >/tmp/archive-list.txt 2>/tmp/tar-error.txt
          echo "tar_rc=$?" | tee -a /tmp/result.txt
          cat /tmp/result.txt
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v713-source-diagnostics
          path: |
            /tmp/result.txt
            /tmp/decode-error.txt
            /tmp/tar-error.txt
            /tmp/archive-list.txt
