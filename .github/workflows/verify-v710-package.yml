name: Verify V7.1.0 package

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract locked package from Git object
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin db05190b496f18b8eafe40dc24d6be25a351cd46
          git show db05190b496f18b8eafe40dc24d6be25a351cd46:releases/nspire_v7_1_0_v42_rebuild.tar.gz > /tmp/nspire-v710.tar.gz
          echo "PACKAGE_SIZE=$(stat -c %s /tmp/nspire-v710.tar.gz)"
          echo "PACKAGE_SHA256=$(sha256sum /tmp/nspire-v710.tar.gz | awk '{print $1}')"
          echo "PACKAGE_GIT_BLOB=$(git hash-object /tmp/nspire-v710.tar.gz)"
          test "$(stat -c %s /tmp/nspire-v710.tar.gz)" -gt 80000
          tar -tzf /tmp/nspire-v710.tar.gz > /tmp/nspire-v710-files.txt
          head -n 30 /tmp/nspire-v710-files.txt
      - name: Run package selftest
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/nspire-v710-extract
          mkdir -p /tmp/nspire-v710-extract
          tar -xzf /tmp/nspire-v710.tar.gz -C /tmp/nspire-v710-extract
          PKG="$(find /tmp/nspire-v710-extract -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          test -n "$PKG"
          test -x "$PKG/install.sh"
          test -x "$PKG/selftest.sh"
          cd "$PKG"
          ./selftest.sh
          cat VERSION
          grep -n '__version__' payload/__init__.py
